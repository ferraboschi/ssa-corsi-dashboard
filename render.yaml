services:
  - type: web
    name: ssa-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SHOPIFY_STORE
        value: sakesommelierassociation.myshopify.com
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: AIRTABLE_API_KEY
        sync: false
      - key: AIRTABLE_BASE_ID
        value: appB0TjUHqfXr4ekq
      - key: AIRTABLE_TABLE_ID
        value: tblnJO5Mf7EVmteRk
    healthCheckPath: /api/health
